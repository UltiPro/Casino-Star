<div class="d-flex justify-content-center">
    <fieldset class="w-50 border border-warning rounded shadow-lg">
        <form class="p-3">
            <div class="input-group mt-2">
                <label class="input-group-addon me-2" for="InputLogin"><img src="/assets/images/user.png"
                        class="icon" /></label>
                <input type="text" (input)="onChangeLogin($event)" class="form-control form-control-sm shadow" id="InputLogin" placeholder="Username">
            </div>
            <div class="input-group mt-2">
                <label class="input-group-addon me-2" for="InputEmail"><img src="/assets/images/email.png"
                        class="icon" /></label>
                <input type="email" (input)="onChangeEmail($event)" class="form-control form-control-sm shadow" id="InputEmail" placeholder="Email">
            </div>
            <div class="input-group mt-2">
                <label class="input-group-addon me-2" for="InputPassword"><img src="/assets/images/password.png"
                        class="icon" /></label>
                <input type="password" (input)="onChangePassword($event)" class="form-control form-control-sm shadow" id="InputPassword"
                    placeholder="Password">
            </div>
            <div class="input-group mt-2">
                <label class="input-group-addon me-2" for="InputPassword2"><img src="/assets/images/password_repeat.png"
                        class="icon" /></label>
                <input type="password" (input)="onChangeSecondPassword($event)" class="form-control form-control-sm shadow" id="InputPassword2"
                    placeholder="Repeat Password">
            </div>
            <button [disabled]="!(isLoginValid && isPasswordValid && isEmailValid && isSecondPasswordValid) ? true : null" type="submit"
                class="btn btn-outline-warning w-100 mt-3 shadow">Sign In</button>
        </form>
    </fieldset>
</div>
