<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-50 border-CasinoNavBar">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">{{appName | uppercase}}</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target=".navbar-collapse"
        aria-label="Toggle navigation" [attr.aria-expanded]="isExpanded" (click)="toggle()">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" [ngClass]="{ show: isExpanded }">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item" [routerLinkActive]="['link-active']" [routerLinkActiveOptions]="{ exact: true }">
            <a class="nav-link text-Casino" [routerLink]="['/Roulette']">Roulette</a>
          </li>
          <li class="nav-item" [routerLinkActive]="['link-active']">
            <a class="nav-link text-Casino" [routerLink]="['/BlackJack']">BlackJack</a>
          </li>
        </ul>
        <button *ngIf="isLogged; else elseLogged " class="btn btn-success">Login <span class="text-Casino">|</span> Sign
          In</button>
        <ng-template #elseLogged>
          <button class="btn btn-secondary p-0 me-2">
            <img src="/assets/images/whiteSettings.png" class="settings-button">
          </button>
          <button class="btn btn-danger">Log Out</button>
        </ng-template>
      </div>
    </div>
  </nav>
</header>
